  - /dataset/embeddings/ftn/2_virchow2@ftn
  - /dataset/embeddings/knl_patos/2_virchow2@knl_patos
  - _self_

val_fold: null
data:
  train:
    uris:
      - ${ikem.mlflow_uris.embeddings.train}
      - ${ftn.mlflow_uris.embeddings.train}
      - ${knl_patos.mlflow_uris.embeddings.train}
